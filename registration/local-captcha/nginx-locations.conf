location = /api/register/challenge {
    if ($request_method != GET) { return 405; }
    limit_req zone=callchat_register_challenge burst=10 nodelay;
    proxy_pass http://127.0.0.1:1031/v1/challenge;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-CallChat-Same-Origin 1;
    proxy_http_version 1.1;
    proxy_read_timeout 8s;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
}

location = /api/register {
    if ($request_method != POST) { return 405; }
    limit_req zone=callchat_register_create burst=5 nodelay;
    client_max_body_size 4k;
    proxy_pass http://127.0.0.1:1031/v1/register;
    proxy_set_header Host $host;
    proxy_set_header Origin $http_origin;
    proxy_set_header X-Real-IP $remote_addr;
    proxy_set_header X-CallChat-Same-Origin 1;
    proxy_http_version 1.1;
    proxy_read_timeout 10s;
    add_header Cache-Control "no-store" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-Frame-Options "DENY" always;
    add_header Referrer-Policy "no-referrer" always;
    add_header Content-Security-Policy "default-src 'none'; frame-ancestors 'none'" always;
}
