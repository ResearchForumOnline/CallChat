# Example Apache virtual host. Replace domains and certificate paths.

<VirtualHost *:443>
    ServerName matrix.example.com

    SSLEngine On
    SSLCertificateFile /etc/letsencrypt/live/matrix.example.com/fullchain.pem
    SSLCertificateKeyFile /etc/letsencrypt/live/matrix.example.com/privkey.pem

    ProxyPreserveHost On
    RequestHeader set X-Forwarded-Proto "https"
    RequestHeader set X-Forwarded-Port "443"

    ProxyPass /_matrix http://127.0.0.1:8008/_matrix nocanon
    ProxyPassReverse /_matrix http://127.0.0.1:8008/_matrix

    ProxyPass /_synapse/client http://127.0.0.1:8008/_synapse/client nocanon
    ProxyPassReverse /_synapse/client http://127.0.0.1:8008/_synapse/client

    ErrorLog ${APACHE_LOG_DIR}/matrix-error.log
    CustomLog ${APACHE_LOG_DIR}/matrix-access.log combined
</VirtualHost>
