name: Security baseline

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  checks:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v7

      - name: Node setup
        uses: actions/setup-node@v6
        with:
          node-version: 24

      - name: Public disclosure boundary
        run: bash scripts/check-public-boundary.sh

      - name: CallChat Community client contract
        run: node client/community/callchat-client.test.mjs

      - name: Local CAPTCHA registration boundary
        run: |
          python3 -m py_compile registration/local-captcha/register_service.py
          python3 -m unittest discover -s registration/local-captcha -p 'test_*.py' -v

      - name: Zero Bot one-reply contract
        run: |
          python3 -m pip install 'requests>=2.32.0,<3'
          python3 -m py_compile ai/callchat-zero-bot/event_guard.py ai/callchat-zero-bot/zero_matrix_bot.py ai/callchat-zero-bot/zero_matrix_bot_e2ee.py
          python3 -m unittest discover -s ai/callchat-zero-bot -p 'test_*.py' -v

      - name: Provider and IonQ assurance boundary
        run: |
          python3 -m py_compile ai/provider_control.py ai/zero_agent_bridge.py ai/test_provider_control.py ai/test_zero_agent_bridge.py
          python3 -m unittest discover -s ai -p 'test_*.py' -v

      - name: Public JSON validation
        run: |
          python3 -m json.tool web/public/api/shield-status.json >/dev/null
          python3 -m json.tool web/public/api/quantum-call-status.json >/dev/null
